name: Upload media

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  upload:
    if: ${{ github.repository == 'alextheman231/media' }}
    runs-on: macos-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Setup PDM
        run: pip install pdm

      - name: Check the PDM lockfile
        run: pdm lock --check

      - name: Install Python dependencies
        run: |
          pdm install --frozen-lockfile
          pdm lock --check

      - name: Setup PNPM
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install JavaScript dependencies
        run: pnpm install

      - name: Clear the existing media folder
        run: rm -rf dist

      - name: Generate the media files
        run: pdm run generate

      - name: Remove cached files from media output
        run: find dist -type d -name partial_movie_files -exec rm -rf {} +

      - name: Shorten commit hash for use in media output name
        id: short_hash
        run: echo "short_hash=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Upload the media files to the workflow output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: dist
          name: media-output_${{ steps.short_hash.outputs.short_hash }}
