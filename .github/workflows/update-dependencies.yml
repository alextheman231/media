name: Update Dependencies
on:
  workflow_dispatch:
  schedule:
    - cron: 0 21 * * 5

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    if: ${{ github.repository == 'alextheman231/media' }}
    uses: alextheman231/github-actions/.github/workflows/update-dependencies.yml@ec8321ac39e8bc3740a45bab0da66249093fcd8f # v11.0.5
    secrets:
      APP_ID: ${{ secrets.ALEX_UP_BOT_APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.ALEX_UP_BOT_PRIVATE_KEY }}
    with:
      runs-on: "macos-latest"
      update_pnpm: true
      update_javascript_dependencies: true
      update_actions: true
      update_python_dependencies: true
